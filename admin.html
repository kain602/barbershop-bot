<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Мастера</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        .admin-card { background: #1e1e1e; padding: 20px; border-radius: 15px; border: 2px solid #0088cc; margin-bottom: 20px; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .status-online { color: #00ff00; font-size: 14px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2>Панель Работника 🪒</h2>
        <p class="status-online">● Мастер в сети</p>
        <p id="master-name">Загрузка...</p>
    </div>

    <div class="admin-card">
        <label>Ответить клиенту (по ID):</label>
        <input type="text" id="client-id" placeholder="ID клиента из уведомления">
        <input type="text" id="reply-msg" placeholder="Текст ответа (например: Ждем вас!)">
        <button class="btn" onclick="sendReply()">ОТПРАВИТЬ ОТВЕТ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const BOT_TOKEN = "8424249026:AAHGygnDhf0-rbcJ8do6PwDjWfl3733q26Y";

        document.getElementById('master-name').innerText = "Мастер: " + (tg.initDataUnsafe?.user?.first_name || "Неизвестно");

        async function sendReply() {
            const cid = document.getElementById('client-id').value;
            const msg = document.getElementById('reply-msg').value;

            if(!cid || !msg) { alert("Заполните все поля!"); return; }

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: cid,
                        text: `<b>✉️ Сообщение от мастера:</b>\n\n${msg}`,
                        parse_mode: 'HTML'
                    })
                });

                if(response.ok) {
                    alert("Ответ отправлен клиенту!");
                } else {
                    alert("Ошибка. Возможно, клиент заблокировал бота.");
                }
            } catch (e) {
                alert("Ошибка сети.");
            }
        }
    </script>
</body>
</html>
