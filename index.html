<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Booking</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #ffffff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #1e1e1e; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 350px; }
        h2 { text-align: center; color: #0088cc; }
        label { display: block; margin-top: 15px; font-size: 14px; color: #aaa; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #333; background: #2b2b2b; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 25px; border-radius: 10px; border: none; background: #0088cc; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00aaff; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="container">
        <h2>Запись в Барбершоп</h2>
        
        <label>Услуга:</label>
        <select id="service">
            <option value="Мужская стрижка">Мужская стрижка</option>
            <option value="Стрижка бороды">Стрижка бороды</option>
            <option value="Комплекс">Комплекс</option>
        </select>

        <label>Мастер:</label>
        <select id="master">
            <option value="Алексей">Алексей</option>
            <option value="Дмитрий">Дмитрий</option>
        </select>

        <label>Дата и время:</label>
        <input type="datetime-local" id="datetime">

        <button onclick="sendOrder()">ЗАПИСАТЬСЯ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const BOT_TOKEN = "8424249026:AAHGygnDhf0-rbcJ8do6PwDjWfl3733q26Y";
        const ADMIN_ID = "1384228457"; // Твой ID, чтобы ты видел все записи

        async function sendToTelegram(chatId, text) {
            return fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: text,
                    parse_mode: 'HTML'
                })
            });
        }

        async function sendOrder() {
            const service = document.getElementById('service').value;
            const master = document.getElementById('master').value;
            const datetime = document.getElementById('datetime').value;

            // ID того человека, который нажал на кнопку
            const userId = tg.initDataUnsafe?.user?.id;
            const userName = tg.initDataUnsafe?.user?.first_name || "Клиент";

            if (!datetime) {
                alert("Пожалуйста, выберите дату и время!");
                return;
            }

            if (!userId) {
                alert("Ошибка: Зайдите через Telegram бота!");
                return;
            }

            const clientMessage = `<b>✅ ВЫ ЗАПИСАНЫ!</b>\n\n✂️ Услуга: ${service}\n👤 Мастер: ${master}\n📅 Время: ${datetime.replace('T', ' ')}`;
            const adminMessage = `<b>🚀 НОВАЯ ЗАПИСЬ!</b>\n\n👤 Клиент: ${userName} (ID: ${userId})\n✂️ Услуга: ${service}\n👤 Мастер: ${master}\n📅 Время: ${datetime.replace('T', ' ')}`;

            try {
                // 1. Отправляем клиенту
                await sendToTelegram(userId, clientMessage);
                
                // 2. Отправляем тебе (админу)
                await sendToTelegram(ADMIN_ID, adminMessage);

                alert("Запись оформлена! Проверьте сообщения от бота.");
                tg.close();
            } catch (e) {
                alert("Произошла ошибка при отправке.");
            }
        }
    </script>
</body>
</html>
