<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Hub Premium</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* [CSS: ФОН] Динамический градиент и общие стили страницы */
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(45deg, #0f172a, #1e293b, #0f172a, #1e3a8a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f8fafc; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; min-height: 100vh; margin: 0; overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* [CSS: КОНТЕЙНЕРЫ] Стилизация карточек с эффектом матового стекла */
        .container { 
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px);
            padding: 25px; border-radius: 28px; width: 100%; max-width: 360px; 
            border: 1px solid rgba(255, 255, 255, 0.1); box-sizing: border-box;
            display: none; flex-direction: column; align-items: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* [CSS: ХАБ ВЫБОРА] Дизайн кнопок выбора Barber или Manicure */
        .menu-card {
            width: 100%; background: rgba(255, 255, 255, 0.05);
            margin-bottom: 15px; padding: 20px; border-radius: 20px;
            display: flex; align-items: center; cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s;
        }
        .menu-card:active { transform: scale(0.95); }
        .menu-card .icon { font-size: 35px; margin-right: 15px; }

        /* [CSS: ФОРМЫ] Поля ввода и выпадающие списки */
        h2 { text-align: center; margin: 0 0 20px 0; }
        .form-group { width: 100%; margin-bottom: 12px; display: flex; flex-direction: column; }
        label { font-size: 12px; color: #94a3b8; margin-bottom: 5px; margin-left: 5px; }
        input, select { 
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(15, 23, 42, 0.8); color: white; font-size: 16px; box-sizing: border-box;
        }

        /* [CSS: КНОПКИ] Стили кнопок действий и навигации */
        .btn-main { width: 100%; padding: 16px; border-radius: 12px; border: none; color: white; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-barber { background: linear-gradient(90deg, #0284c7, #38bdf8); }
        .btn-nails { background: linear-gradient(90deg, #db2777, #f472b6); }
        .btn-back { background: none; color: #94a3b8; font-size: 13px; margin-top: 10px; cursor: pointer; }

        /* [CSS: СТАТУС] Окно с информацией о текущей записи */
        .status-msg { font-size: 13px; text-align: center; color: #fbbf24; background: rgba(251, 191, 36, 0.1); padding: 10px; border-radius: 10px; margin-bottom: 15px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="hub-ui" class="container" style="display: flex;">
        <h2>Выберите сервис</h2>
        <div id="active-booking-status"></div> 
        
        <div class="menu-card" onclick="openSection('barber')">
            <div class="icon">✂️</div>
            <div class="text"><h3>Barbershop</h3><p>Стрижки и борода</p></div>
        </div>

        <div class="menu-card" onclick="openSection('nails')">
            <div class="icon">💅</div>
            <div class="text"><h3>Manicure</h3><p>Уход и покрытие</p></div>
        </div>
    </div>

    <div id="barber-ui" class="container">
        <h2 style="color: #38bdf8;">Barbershop</h2>
        <div class="form-group"><label>Телефон</label><input type="tel" id="b-phone" value="8 7"></div>
        <div class="form-group"><label>Услуга</label>
            <select id="b-service">
                <option>Мужская стрижка — 4 000 ₸</option>
                <option>Стрижка бороды — 2 500 ₸</option>
                <option>Комплекс — 6 000 ₸</option>
            </select>
        </div>
        <div class="form-group"><label>Дата и время</label><input type="datetime-local" id="b-date"></div>
        <button class="btn-main btn-barber" onclick="sendBooking('Barber')">ЗАПИСАТЬСЯ</button>
        <button class="btn-back" onclick="goBack()">← Вернуться к выбору</button>
    </div>

    <div id="nails-ui" class="container">
        <h2 style="color: #f472b6;">Manicure</h2>
        <div class="form-group"><label>Телефон</label><input type="tel" id="n-phone" value="8 7"></div>
        <div class="form-group"><label>Услуга</label>
            <select id="n-service">
                <option>Маникюр + Гель — 5 000 ₸</option>
                <option>Наращивание — 8 000 ₸</option>
                <option>Педикюр — 6 000 ₸</option>
            </select>
        </div>
        <div class="form-group"><label>Дата и время</label><input type="datetime-local" id="n-date"></div>
        <button class="btn-main btn-nails" onclick="sendBooking('Manicure')">ЗАПИСАТЬСЯ</button>
        <button class="btn-back" onclick="goBack()">← Вернуться к выбору</button>
    </div>

    <div id="admin-ui" class="container">
        <h2>Мастер <span style="font-size: 10px; background: orange; padding: 2px 5px; border-radius: 5px; color: black;">ADMIN</span></h2>
        <div class="form-group"><label>ID клиента (из уведомления)</label><input type="text" id="reply-id"></div>
        <div class="form-group"><label>Ваш ответ</label><input type="text" id="reply-text" placeholder="Напишите клиенту..."></div>
        <button class="btn-main" style="background: #10b981;" onclick="sendReply()">ОТПРАВИТЬ ОТВЕТ</button>
    </div>

    <script>
        /* [JS: НАСТРОЙКИ] Токены и права доступа */
        const tg = window.Telegram.WebApp;
        tg.expand();
        const BOT_TOKEN = "8424249026:AAHGygnDhf0-rbcJ8do6PwDjWfl3733q26Y";
        const MAIN_ADMIN = "1384228457"; // Твой ID
        const ADMIN_LIST = [MAIN_ADMIN]; 

        const userId = String(tg.initDataUnsafe?.user?.id || "000");
        const userName = tg.initDataUnsafe?.user?.first_name || "Гость";

        /* [JS: СТАТУС ЗАПИСИ] Функция расчета времени до визита */
        function checkStatus() {
            const lastBooking = JSON.parse(localStorage.getItem(`activeBooking_${userId}`));
            if (lastBooking) {
                const now = new Date();
                const bookDate = new Date(lastBooking.date);
                const diffMs = bookDate - now;

                if (diffMs > 0) {
                    const hours = Math.floor(diffMs / 3600000);
                    const mins = Math.floor((diffMs % 3600000) / 60000);
                    document.getElementById('active-booking-status').innerHTML = `
                        <div class="status-msg">
                            ⏳ У вас есть активная запись!<br>
                            <b>${lastBooking.type}: ${lastBooking.service}</b><br>
                            Осталось времени: ${hours}ч ${mins}мин
                        </div>`;
                }
            }
        }
        checkStatus();

        /* [JS: НАВИГАЦИЯ] Функции переключения экранов */
        function openSection(type) {
            document.getElementById('hub-ui').style.display = 'none';
            if (type === 'barber') document.getElementById('barber-ui').style.display = 'flex';
            if (type === 'nails') document.getElementById('nails-ui').style.display = 'flex';
        }
        function goBack() {
            document.getElementById('barber-ui').style.display = 'none';
            document.getElementById('nails-ui').style.display = 'none';
            document.getElementById('hub-ui').style.display = 'flex';
        }

        // Проверка: админ зашел или клиент
        if (ADMIN_LIST.includes(userId)) {
            document.getElementById('hub-ui').style.display = 'none';
            document.getElementById('admin-ui').style.display = 'flex';
        }

        /* [JS: ЛОГИКА ЗАПИСИ] Сбор данных и отправка в бот */
        async function sendBooking(category) {
            const prefix = category === 'Barber' ? 'b-' : 'n-';
            const phone = document.getElementById(prefix + 'phone').value.replace(/\D/g, '');
            const service = document.getElementById(prefix + 'service').value;
            const dateInput = document.getElementById(prefix + 'date').value;

            if (phone.length < 11 || !dateInput) return alert("Пожалуйста, укажите телефон и время визита!");

            // [ОГРАНИЧЕНИЕ ОТКЛЮЧЕНО ПО ПРОСЬБЕ ПОЛЬЗОВАТЕЛЯ]
            // Раньше здесь была проверка на 30 минут.

            // Сохраняем информацию для таймера на главном экране
            localStorage.setItem(`activeBooking_${userId}`, JSON.stringify({ type: category, service: service, date: dateInput }));

            const waLink = `https://wa.me/7${phone.substring(1)}`;
            const adminMsg = `🚀 <b>НОВАЯ ЗАПИСЬ [${category.toUpperCase()}]</b>\n━━━━━━━━━━━━━\n👤 <b>Клиент:</b> ${userName}\n📞 <b>Тел:</b> ${phone}\n✂️ <b>Услуга:</b> ${service}\n📅 <b>Время:</b> ${dateInput.replace('T', ' ')}\n━━━━━━━━━━━━━\n🔔 <b>НАПОМНИТЬ ЗА 30 МИНУТ!</b>\n━━━━━━━━━━━━━\n💬 <a href="${waLink}">Написать в WhatsApp</a>\n🆔 <b>ID:</b> <code>${userId}</code>`;
            
            const clientMsg = `✅ <b>ВЫ УСПЕШНО ЗАПИСАНЫ!</b>\n\n📍 Категория: ${category}\n✂️ Услуга: ${service}\n📅 Время: ${dateInput.replace('T', ' ')}\n\n🔔 <b>Бот отправит вам напоминание за 30 минут до начала визита!</b>`;

            try {
                // Отправка мастеру
                for (let id of ADMIN_LIST) {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: id, text: adminMsg, parse_mode: 'HTML', disable_web_page_preview: true })
                    });
                }
                // Отправка клиенту (подтверждение)
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: userId, text: clientMsg, parse_mode: 'HTML' })
                });
                tg.showAlert("Готово! Запись подтверждена.");
                tg.close();
            } catch (e) { alert("Ошибка при отправке данных бота."); }
        }

        /* [JS: ОТВЕТ АДМИНА] Функция обратной связи с клиентом */
        async function sendReply() {
            const cid = document.getElementById('reply-id').value.trim();
            const msg = document.getElementById('reply-text').value.trim();
            if (!cid || !msg) return alert("Укажите корректный ID и введите текст сообщения!");

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: cid, text: `<b>✉️ Сообщение от мастера:</b>\n\n${msg}`, parse_mode: 'HTML' })
                });
                
                // Копия главному админу для контроля помощников
                if (userId !== MAIN_ADMIN) {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: MAIN_ADMIN, text: `<b>👁 Контроль:</b> ${userName} ответил клиенту ${cid}:\n"${msg}"`, parse_mode: 'HTML' })
                    });
                }
                alert("Сообщение успешно отправлено клиенту!");
                document.getElementById('reply-text').value = "";
            } catch (e) { alert("Ошибка при отправке ответа."); }
        }
    </script>
</body>
</html>
