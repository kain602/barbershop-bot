<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberShop Control System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* [CSS] Живые обои и анимация градиента */
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(45deg, #0f172a, #1e293b, #0f172a, #1e3a8a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f8fafc; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            padding: 20px; 
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* [CSS] Стеклянная карточка и выравнивание */
        .container { 
            background: rgba(30, 41, 59, 0.65); 
            backdrop-filter: blur(15px);
            padding: 30px; 
            border-radius: 28px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); 
            width: 100%; 
            max-width: 360px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
            display: none; 
            flex-direction: column;
            align-items: center;
        }

        h2 { text-align: center; color: #38bdf8; margin: 0 0 25px 0; font-weight: 700; width: 100%; }
        .form-group { width: 100%; margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-size: 13px; color: #94a3b8; margin-bottom: 8px; margin-left: 5px; }
        
        select, input { 
            width: 100%; padding: 14px 16px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.8); 
            color: white; font-size: 16px; box-sizing: border-box;
        }

        button { 
            width: 100%; padding: 16px; margin-top: 15px; border-radius: 12px; border: none; 
            background: linear-gradient(90deg, #0284c7 0%, #38bdf8 100%); 
            color: white; font-size: 16px; font-weight: 700; cursor: pointer;
        }

        .admin-badge { background: #f59e0b; color: #000; padding: 3px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; }
    </style>
</head>
<body>

    <div id="client-ui" class="container">
        <h2>Premium Barber</h2>
        <div class="form-group">
            <label>Ваш номер телефона</label>
            <input type="tel" id="phone" value="8 7" maxlength="15">
        </div>
        <div class="form-group">
            <label>Выберите услугу</label>
            <select id="service">
                <option value="Мужская стрижка (4000 ₸)">Мужская стрижка — 4 000 ₸</option>
                <option value="Стрижка бороды (2500 ₸)">Стрижка бороды — 2 500 ₸</option>
                <option value="Комплекс (6000 ₸)">Комплекс — 6 000 ₸</option>
            </select>
        </div>
        <div class="form-group">
            <label>Дата и время визита</label>
            <input type="datetime-local" id="datetime">
        </div>
        <button onclick="sendOrder()">ЗАПИСАТЬСЯ</button>
    </div>

    <div id="admin-ui" class="container">
        <h2>Мастер <span class="admin-badge">Admin</span></h2>
        <p id="admin-greeting" style="text-align: center; color: #38bdf8;"></p>
        <div class="form-group">
            <label>ID клиента</label>
            <input type="text" id="reply-id" placeholder="Вставь ID">
        </div>
        <div class="form-group">
            <label>Текст ответа</label>
            <input type="text" id="reply-text" placeholder="Ваше сообщение">
        </div>
        <button style="background: #10b981;" onclick="sendReply()">ОТПРАВИТЬ ОТВЕТ</button>
    </div>

    <script>
        /* [JS] Логика администрирования */
        const tg = window.Telegram.WebApp;
        tg.expand();

        const BOT_TOKEN = "8424249026:AAHGygnDhf0-rbcJ8do6PwDjWfl3733q26Y";
        
        // ГЛАВНЫЙ АДМИН (Получает все копии ответов)
        const MAIN_ADMIN = "1384228457"; 
        
        // Список всех админов (включая главного)
        const ADMIN_LIST = [MAIN_ADMIN, "5348210978"]; 

        const user = tg.initDataUnsafe?.user;
        const userId = String(user?.id);
        const userName = user?.first_name || "Гость";

        function showUI() {
            const clientCard = document.getElementById('client-ui');
            const adminCard = document.getElementById('admin-ui');
            if (ADMIN_LIST.includes(userId)) {
                adminCard.style.display = 'flex';
                clientCard.remove();
                document.getElementById('admin-greeting').innerText = `Админ: ${userName} ${userId === MAIN_ADMIN ? '(Главный)' : ''}`;
            } else {
                clientCard.style.display = 'flex';
                adminCard.remove();
            }
        }
        showUI();

        /* [JS] Отправка записи (как на 2 скрине) */
        async function sendOrder() {
            const rawPhone = document.getElementById('phone').value.replace(/\D/g, '');
            const service = document.getElementById('service').value;
            const datetime = document.getElementById('datetime').value;

            if (rawPhone.length < 11 || !datetime) return alert("Заполните всё!");

            const waLink = `https://wa.me/7${rawPhone.substring(1)}`;
            const adminText = `🚀 <b>НОВАЯ ЗАПИСЬ (KZ)</b>\n━━━━━━━━━━━━━\n👤 <b>Клиент:</b> ${userName}\n📞 <b>Тел:</b> ${rawPhone}\n✂️ <b>Услуга:</b> ${service}\n📅 <b>Время:</b> ${datetime.replace('T', ' ')}\n━━━━━━━━━━━━━\n🔔 <b>НУЖНО НАПОМИНАНИЕ ЗА 30 МИН!</b>\n━━━━━━━━━━━━━\n💬 <a href="${waLink}">Написать в WhatsApp</a>\n🆔 <b>ID:</b> <code>${userId}</code>`;
            const clientText = `✅ <b>ВЫ ЗАПИСАНЫ!</b>\n\n✂️ Услуга: ${service}\n📅 Время: ${datetime.replace('T', ' ')}\n\n🔔 <b>Бот напомнит вам о записи за 30 минут до начала!</b>`;

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: userId, text: clientText, parse_mode: 'HTML' })
                });

                for (let id of ADMIN_LIST) {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: id, text: adminText, parse_mode: 'HTML', disable_web_page_preview: true })
                    });
                }
                tg.close();
            } catch (e) { alert("Ошибка!"); }
        }

        /* [JS] Функция ответа с контролем для главного админа */
        async function sendReply() {
            const cid = document.getElementById('reply-id').value.trim();
            const msg = document.getElementById('reply-text').value.trim();
            if (!cid || !msg) return alert("Заполни поля!");

            try {
                // 1. Отправка клиенту
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: cid, text: `<b>✉️ Ответ от мастера:</b>\n\n${msg}`, parse_mode: 'HTML' })
                });

                // 2. ОТПРАВКА КОПИИ ГЛАВНОМУ АДМИНУ (если ответил другой админ)
                if (userId !== MAIN_ADMIN) {
                    const controlMsg = `<b>👁 КОНТРОЛЬ ОТВЕТА</b>\n━━━━━━━━━━━━━\n👤 <b>Ответил:</b> ${userName} (ID: ${userId})\n👤 <b>Кому:</b> ID ${cid}\n💬 <b>Текст:</b> ${msg}`;
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: MAIN_ADMIN, text: controlMsg, parse_mode: 'HTML' })
                    });
                }

                alert("Ответ отправлен клиенту!");
                document.getElementById('reply-text').value = "";
            } catch (e) { alert("Ошибка при отправке!"); }
        }
    </script>
</body>
</html>
