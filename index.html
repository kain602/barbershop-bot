<!DOCTYPE html> <html lang="ru"> <head>
    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Beauty Hub</title> <script src="https://telegram.org/js/telegram-web-app.js"></script> <style>
        :root { /* Глобальные переменные цветов */
            --bg-main: linear-gradient(45deg, #0f172a, #1e293b);
            --bg-barber: linear-gradient(135deg, #020617, #1e293b);
            --bg-nails: linear-gradient(135deg, #4c0519, #9d174d);
        }
        body { /* Базовые стили страницы */
            font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; transition: background 0.6s ease; overflow: hidden;
        }
        body.barber-mode { background: var(--bg-barber); } /* Фон для барбершопа */
        body.nails-mode { background: var(--bg-nails); } /* Фон для маникюра */

        .container { /* Основной контейнер форм */
            background: rgba(15,23,42,0.7); backdrop-filter: blur(20px);
            padding: 25px; border-radius: 30px; width: 90%; max-width: 360px;
            display: none; flex-direction: column; border: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.5s ease forwards; /* Плавное появление карточки */
        }
        @keyframes fadeIn { /* Анимация появления */
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .menu-card { /* Стиль кнопок главного меню */
            width: 100%; background: rgba(255,255,255,0.05); margin-bottom: 15px;
            padding: 20px; border-radius: 24px; display: flex; align-items: center;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .menu-card:active { transform: scale(0.95); } /* Эффект нажатия на кнопку */

        input, select, button { /* Стили полей ввода и кнопок */
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: none;
            background: rgba(0,0,0,0.3); color: #fff; font-size: 16px; outline: none;
        }
        button { font-weight: bold; cursor: pointer; transition: 0.3s; } /* Базовый стиль кнопки */
        .btn-barber { background: #2563eb; } .btn-nails { background: #be185d; } .btn-admin { background: #10b981; }
        .btn-back { color: #94a3b8; margin-top: 15px; cursor: pointer; text-align: center; } /* Кнопка Назад */
    </style>
</head>
<body id="body">

    <div id="hub-ui" class="container" style="display: flex;">
        <h2>Beauty Hub</h2> <div class="menu-card" onclick="openS('barber')">✂️ Barbershop</div> <div class="menu-card" onclick="openS('nails')">💅 Manicure</div> </div>

    <div id="barber-ui" class="container">
        <h2 style="color: #38bdf8;">Barbershop</h2> <input type="tel" id="b-phone" value="8 " maxlength="15"> <select id="b-master"><option>Санжар</option><option>Женыс</option></select> <select id="b-service"><option>Стрижка — 4000 ₸</option><option>Борода — 2500 ₸</option></select> <input type="datetime-local" id="b-date"> <button class="btn-barber" onclick="sendB('Barber')">ЗАПИСАТЬСЯ</button> <div class="btn-back" onclick="goB()">← Назад</div> </div>

    <div id="nails-ui" class="container">
        <h2 style="color: #f472b6;">Manicure</h2> <input type="tel" id="n-phone" value="8 " maxlength="15"> <select id="n-master"><option>Акмарал</option><option>Жулдыз</option></select> <select id="n-service"><option>Маникюр — 5000 ₸</option><option>Педикюр — 6000 ₸</option></select> <input type="datetime-local" id="n-date"> <button class="btn-nails" onclick="sendB('Manicure')">ЗАПИСАТЬСЯ</button> <div class="btn-back" onclick="goB()">← Назад</div> </div>

    <div id="admin-ui" class="container">
        <h2>Admin <span style="font-size: 12px; color: #f59e0b;">Control</span></h2> <input type="text" id="rid" placeholder="ID клиента"> <input type="text" id="rtxt" placeholder="Ваш ответ..."> <button class="btn-admin" onclick="reply()">ОТПРАВИТЬ</button> </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); // Работа с Telegram WebApp
        const BOT_TOKEN = "8424249026:AAHGygnDhf0-rbcJ8do6PwDjWfl3733q26Y"; // Токен бота
        const ADMINS = ["1384228457", "ТВОЙ_ВТОРОЙ_ID"]; // Список админов
        const uid = String(tg.initDataUnsafe?.user?.id || ""), utag = "@" + (tg.initDataUnsafe?.user?.username || "no_tag"); // Данные юзера

        if (ADMINS.includes(uid)) { // Проверка на админа
            document.getElementById('hub-ui').style.display = 'none';
            document.getElementById('admin-ui').style.display = 'flex';
        }

        function mask(id) { // Функция маски телефона 8 7XX...
            const i = document.getElementById(id); i.oninput = () => {
                let v = i.value.replace(/\D/g, ''); if (!v.startsWith('8')) v = '8' + v;
                let f = '8'; if (v.length > 1) f += ' ' + v.substring(1, 4); if (v.length > 4) f += ' ' + v.substring(4, 7);
                if (v.length > 7) f += ' ' + v.substring(7, 9); if (v.length > 9) f += ' ' + v.substring(9, 11); i.value = f;
            };
        }
        mask('b-phone'); mask('n-phone'); // Применение маски

        function openS(s) { // Переход в раздел с анимацией
            document.getElementById('hub-ui').style.display = 'none';
            document.getElementById(s + '-ui').style.display = 'flex'; document.body.className = s + '-mode';
        }

        function goB() { // Возврат назад в меню
            document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
            document.getElementById('hub-ui').style.display = 'flex'; document.body.className = '';
        }

        async function sendB(type) { // Функция отправки записи
            const p = type === 'Barber' ? 'b-' : 'n-';
            const ph = document.getElementById(p + 'phone').value, m = document.getElementById(p + 'master').value;
            const s = document.getElementById(p + 'service').value, d = document.getElementById(p + 'date').value;
            if (ph.length < 14 || !d) return alert("Заполните данные!"); // Проверка заполнения

            const msg = `🚀 <b>ЗАПИСЬ ${type}</b>\n👤 ${utag}\n📞 ${ph}\n👤 Мастер: ${m}\n✂️ ${s}\n📅 ${d}\n🆔 <code>${uid}</code>`; // Текст для админа
            for (let a of ADMINS) await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${a}&text=${encodeURIComponent(msg)}&parse_mode=HTML`); // Отправка админам
            
            tg.showAlert("Запись подтверждена!"); tg.close(); // Сообщение и закрытие
        }

        async function reply() { // Функция ответа админа
            const id = document.getElementById('rid').value, txt = document.getElementById('rtxt').value;
            if (!id || !txt) return alert("Введите данные!"); // Проверка полей
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent('<b>✉️ Ответ мастера:</b>\n'+txt)}&parse_mode=HTML`); // Отправка клиенту
            alert("Отправлено!"); document.getElementById('rtxt').value = ""; // Очистка поля
        }
    </script>
</body>
</html>
