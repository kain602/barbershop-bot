<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BarberShop Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000; /* Глубокий черный */
            --card-bg: #121212; /* Цвет карточек */
            --accent-color: #ffffff; /* Белый акцент */
            --text-main: #ffffff;
            --text-secondary: #888888;
            --button-bg: #ffffff;
            --button-text: #000000;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h2 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid #222;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        select:focus, input:focus {
            border-color: var(--accent-color);
        }

        .submit-btn {
            margin-top: auto;
            width: 100%;
            padding: 18px;
            background: var(--button-bg);
            color: var(--button-text);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        /* Стиль для календаря (инверсия иконок в темной теме) */
        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
    </style>
</head>
<body>

    <h2>Бронирование</h2>
    
    <div class="form-group">
        <label>Услуга</label>
        <select id="service">
            <option value="Мужская стрижка">Мужская стрижка — 8 000 ₸</option>
            <option value="Стрижка бороды">Стрижка бороды — 5 000 ₸</option>
            <option value="Комплекс">Стрижка + Борода — 11 000 ₸</option>
            <option value="Окрашивание">Окрашивание — 10 000 ₸</option>
        </select>
    </div>

    <div class="form-group">
        <label>Мастер</label>
        <select id="master">
            <option value="Александр">Александр (Top Master)</option>
            <option value="Дмитрий">Дмитрий (Barber)</option>
            <option value="Арман">Арман (Junior)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Дата и время</label>
        <input type="datetime-local" id="datetime">
    </div>

    <button class="submit-btn" id="main_button">ЗАПИСАТЬСЯ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation(); // Подтверждение закрытия

        const btn = document.getElementById('main_button');

        btn.addEventListener('click', () => {
            const service = document.getElementById('service').value;
            const master = document.getElementById('master').value;
            const datetime = document.getElementById('datetime').value;

            if (!datetime) {
                tg.showAlert("Пожалуйста, выберите дату и время!");
                return;
            }

            // Данные для отправки боту
            const data = {
                service: service,
                master: master,
                date: datetime.replace('T', ' ')
            };

            // Отправляем данные в чат бота
            tg.sendData(JSON.stringify(data));
            tg.close();
        });
    </script>
</body>
</html>
