<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Booking</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #ffffff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #1e1e1e; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 350px; }
        h2 { text-align: center; color: #0088cc; }
        label { display: block; margin-top: 15px; font-size: 14px; color: #aaa; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #333; background: #2b2b2b; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 25px; border-radius: 10px; border: none; background: #0088cc; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00aaff; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="container">
        <h2>Запись на стрижку</h2>
        
        <label>Выберите услугу:</label>
        <select id="service">
            <option value="Мужская стрижка">Мужская стрижка</option>
            <option value="Стрижка бороды">Стрижка бороды</option>
            <option value="Комплекс">Комплекс</option>
        </select>

        <label>Мастер:</label>
        <select id="master">
            <option value="Алексей">Алексей</option>
            <option value="Дмитрий">Дмитрий</option>
        </select>

        <label>Дата и время:</label>
        <input type="datetime-local" id="datetime">

        <button onclick="sendDataToBot()">ЗАПИСАТЬСЯ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const BOT_TOKEN = "8424249026:AAHGygnDhf0-rbcJ8do6PwDjWfl3733q26Y";

        async function sendDataToBot() {
            const service = document.getElementById('service').value;
            const master = document.getElementById('master').value;
            const datetime = document.getElementById('datetime').value;

            // ПОЛУЧАЕМ ID ТОГО, КТО ОТКРЫЛ БОТА
            const user = tg.initDataUnsafe?.user;
            const userId = user?.id;

            if (!userId) {
                alert("Ошибка: не удалось определить ваш Telegram ID. Запустите приложение через бота.");
                return;
            }

            if (!datetime) {
                alert("Пожалуйста, выберите время!");
                return;
            }

            const message = `
<b>🚀 ВАША ЗАПИСЬ ОФОРМЛЕНА!</b>
━━━━━━━━━━━━━
👤 <b>Клиент:</b> ${user.first_name || 'Пользователь'}
✂️ <b>Услуга:</b> ${service}
👤 <b>Мастер:</b> ${master}
📅 <b>Когда:</b> ${datetime.replace('T', ' ')}
━━━━━━━━━━━━━
<i>Спасибо, что выбрали нас!</i>`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: userId, // Отправляем тому, кто нажал кнопку
                        text: message,
                        parse_mode: 'HTML'
                    })
                });

                if (response.ok) {
                    alert("✅ Готово! Бот отправил подтверждение вам в личные сообщения.");
                    tg.close();
                } else {
                    const errorData = await response.json();
                    if (errorData.error_code === 403) {
                        alert("Ошибка: Сначала нажмите 'Запустить' (Start) в самом боте!");
                    } else {
                        alert("Ошибка: " + errorData.description);
                    }
                }
            } catch (e) {
                alert("Ошибка сети: " + e.message);
            }
        }
    </script>
</body>
</html>
