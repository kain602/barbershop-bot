<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberShop Premium</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* СТИЛИ (CSS) — ОТВЕЧАЮТ ЗА ВНЕШНИЙ ВИД */

        /* Основной фон всего приложения: современный градиент */
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            color: #f8fafc; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            min-height: 100vh;
            margin: 0;
        }

        /* Главная карточка: эффект "матового стекла" (Glassmorphism) */
        .container { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); /* Размытие фона за карточкой */
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); /* Мягкая тень под карточкой */
            width: 100%; 
            max-width: 360px; 
            border: 1px solid rgba(255,255,255,0.1); /* Тонкая рамка для эффекта объема */
            display: none; /* Скрыто по умолчанию, включается скриптом ниже */
            box-sizing: border-box;
        }

        /* Заголовки: яркий небесно-голубой цвет */
        h2 { text-align: center; color: #38bdf8; margin-bottom: 25px; font-weight: 700; letter-spacing: 1px; }

        /* Подписи к полям: серый спокойный цвет */
        label { display: block; margin-top: 15px; font-size: 13px; color: #94a3b8; font-weight: 500; margin-left: 5px; }

        /* Поля ввода (Инпуты) и Списки (Селекты) */
        select, input { 
            width: 100%; 
            padding: 14px; 
            margin-top: 8px; 
            border-radius: 12px; 
            border: 1px solid #334155; 
            background: #0f172a; 
            color: white; 
            box-sizing: border-box; 
            font-size: 16px;
            transition: all 0.3s ease; /* Плавная смена цвета при нажатии */
        }

        /* Цвет рамки при нажатии на поле */
        select:focus, input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        /* Главная кнопка: яркий градиент и тень */
        button { 
            width: 100%; 
            padding: 16px; 
            margin-top: 30px; 
            border-radius: 12px; 
            border: none; 
            background: linear-gradient(90deg, #0284c7 0%, #38bdf8 100%); 
            color: white; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4);
            transition: all 0.3s ease;
        }

        /* Эффект при нажатии на кнопку (чуть уменьшается) */
        button:active { transform: scale(0.96); box-shadow: none; }

        /* Значок АДМИНА (оранжевый) */
        .admin-badge { background: #f59e0b; color: #000; padding: 3px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        
        /* Мелкий пояснительный текст внизу */
        .info-msg { font-size: 12px; color: #64748b; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="client-ui" class="container">
        <h2>Premium Barber</h2>
        <label>Контактный телефон</label>
        <input type="tel" id="phone" value="8 7" maxlength="15">

        <label>Выберите услугу</label>
        <select id="service">
            <option value="Мужская стрижка (4000 ₸)">Мужская стрижка — 4 000 ₸</option>
            <option value="Стрижка бороды (2500 ₸)">Стрижка бороды — 2 500 ₸</option>
            <option value="Комплекс (6000 ₸)">Комплекс — 6 000 ₸</option>
        </select>

        <label>Дата и время визита</label>
        <input type="datetime-local" id="datetime" step="3600">

        <button onclick="sendOrder()">ЗАПИСАТЬСЯ</button>
        <p class="info-msg">Напомним за 30 минут до визита 🔔</p>
    </div>

    <div id="admin-ui" class="container">
        <h2>Мастер <span class="admin-badge">Admin</span></h2>
        <p id="admin-greeting" style="text-align: center; font-size: 14px; color: #38bdf8;"></p>
        <hr style="border: 0; border-top: 1px solid #334155; margin: 20px 0;">
        
        <label>ID клиента для ответа</label>
        <input type="text" id="reply-id" placeholder="Вставь ID из сообщения">
        <label>Ваш ответ</label>
        <input type="text" id="reply-text" placeholder="Напр: Подтверждаю, ждем вас!">
        
        <button style="background: linear-gradient(90deg, #059669 0%, #10b981 100%); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);" onclick="sendReply()">ОТПРАВИТЬ ОТВЕТ КЛИЕНТУ</button>
    </div>

    <script>
        /* СКРИПТ (JS) — ЛОГИКА И "МОЗГИ" ПРИЛОЖЕНИЯ */

        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть окно бота на максимум

        const BOT_TOKEN = "8424249026:AAHGygnDhf0-rbcJ8do6PwDjWfl3733q26Y";
        
        // --- НАСТРОЙКА ДОСТУПА ---
        // Сюда в кавычках через запятую вписывай ID тех, кто должен видеть админку
        const ADMIN_LIST = ["1384228457"]; 

        const user = tg.initDataUnsafe?.user;
        const userId = String(user?.id);
        const userName = user?.first_name || "Гость";

        /* ПРОВЕРКА: Кому что показывать */
        if (ADMIN_LIST.includes(userId)) {
            // Если ID в списке админов — показываем панель мастера
            document.getElementById('admin-ui').style.display = 'block';
            document.getElementById('admin-greeting').innerText = `Добро пожаловать, ${userName}`;
        } else {
            // Иначе показываем форму записи клиенту
            document.getElementById('client-ui').style.display = 'block';
        }

        /* МАСКА ТЕЛЕФОНА: Автоматически делает пробелы "8 7XX XXX XX XX" */
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, ''); // Удаляем всё кроме цифр
            if (value.length < 2) value = '87'; // Принудительно возвращаем 87
            let formatted = '8';
            if (value.length > 1) formatted += ' ' + value.substring(1, 4);
            if (value.length > 4) formatted += ' ' + value.substring(4, 7);
            if (value.length > 7) formatted += ' ' + value.substring(7, 9);
            if (value.length > 9) formatted += ' ' + value.substring(9, 11);
            e.target.value = formatted;
        });

        /* ФУНКЦИЯ ОТПРАВКИ ЗАПИСИ КЛИЕНТОМ */
        async function sendOrder() {
            const rawPhone = phoneInput.value.replace(/\D/g, ''); // Номер слитно для ссылок
            const service = document.getElementById('service').value;
            const datetime = document.getElementById('datetime').value;

            // Если поля пустые — ругаемся
            if (rawPhone.length < 11) { alert("Введите полный номер!"); return; }
            if (!datetime) { alert("Выберите время визита!"); return; }

            // ПРОВЕРКА ЗАНЯТОСТИ: Чтобы один и тот же человек не жал кнопку дважды на одно время
            const bookingKey = `book_${datetime}`;
            if (localStorage.getItem(bookingKey)) {
                alert("Это время уже занято. Пожалуйста, выберите другое.");
                return;
            }

            // Ссылка для WhatsApp (переводим 8-ку в 7-ку)
            const waPhone = '7' + rawPhone.substring(1); 
            const waLink = `https://wa.me/${waPhone}`;

            // Сообщение для Мастера (Админа)
            const adminText = `<b>🆕 ЗАПИСЬ НА ВИЗИТ</b>\n━━━━━━━━━━━━━\n👤 <b>Клиент:</b> ${userName}\n📞 <b>Тел:</b> <code>${rawPhone}</code>\n✂️ <b>Услуга:</b> ${service}\n📅 <b>Время:</b> ${datetime.replace('T', ' ')}\n━━━━━━━━━━━━━\n🔔 <b>НАПОМНИТЬ ЗА 30 МИН!</b>\n━━━━━━━━━━━━━\n💬 <a href="${waLink}">Написать в WhatsApp</a>\n🆔 <b>ID для ответа:</b> <code>${userId}</code>`;
            
            // Сообщение для Клиента
            const clientText = `<b>✅ ЗАПИСЬ ПОДТВЕРЖДЕНА!</b>\n\n✂️ Услуга: ${service}\n📅 Время: ${datetime.replace('T', ' ')}\n\nМы пришлем напоминание за 30 минут 🔔`;

            try {
                // 1. Шлем подтверждение клиенту
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: userId, text: clientText, parse_mode: 'HTML' })
                });

                // 2. Шлем заявку всем админам
                for (let id of ADMIN_LIST) {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: id, text: adminText, parse_mode: 'HTML', disable_web_page_preview: true })
                    });
                }

                // Помечаем время как "занятое" локально
                localStorage.setItem(bookingKey, "true");
                tg.showAlert("Готово! Запись создана.");
                tg.close();
            } catch (e) { alert("Ошибка при отправке. Проверьте интернет."); }
        }

        /* ФУНКЦИЯ ОТВЕТА МАСТЕРА КЛИЕНТУ */
        async function sendReply() {
            const cid = document.getElementById('reply-id').value.trim();
            const msg = document.getElementById('reply-text').value.trim();
            if (!cid || !msg) return alert("Заполните ID клиента и текст!");

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: cid, text: `<b>✉️ Сообщение от BarberShop:</b>\n\n${msg}`, parse_mode: 'HTML' })
                });
                alert("Ответ отправлен клиенту!");
                document.getElementById('reply-text').value = "";
            } catch (e) { alert("Ошибка при отправке!"); }
        }
    </script>
</body>
</html>
