<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberShop Premium Live</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* CSS: АНИМАЦИЯ ФОНА (ЖИВЫЕ ОБОИ) */
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            /* Создаем длинный градиент для анимации */
            background: linear-gradient(45deg, #0f172a, #1e293b, #0f172a, #1e3a8a);
            background-size: 400% 400%;
            /* Запускаем бесконечное переливание цветов */
            animation: gradientBG 15s ease infinite;
            color: #f8fafc; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* Чтобы сферы не создавали полосу прокрутки */
        }

        /* ЛОГИКА ДВИЖЕНИЯ ГРАДИЕНТА */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* CSS: ПЛАВАЮЩИЕ СВЕРЫ (ДЕКОР) */
        .bg-sphere {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px); /* Делает круги мягкими и туманными */
            z-index: -1; /* Прячет их за основной контент */
            opacity: 0.4;
            animation: float 12s infinite alternate ease-in-out;
        }
        .sphere-1 { width: 300px; height: 300px; background: #38bdf8; top: -50px; right: -50px; }
        .sphere-2 { width: 250px; height: 250px; background: #818cf8; bottom: -50px; left: -50px; animation-delay: -3s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 60px) scale(1.1); }
        }

        /* CSS: ДИЗАЙН КАРТОЧКИ (ЭФФЕКТ СТЕКЛА) */
        .container { 
            background: rgba(30, 41, 59, 0.65); 
            backdrop-filter: blur(15px); /* Матовое размытие */
            padding: 30px; 
            border-radius: 28px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); 
            width: 100%; 
            max-width: 360px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none; 
            box-sizing: border-box;
            position: relative;
        }

        /* CSS: ПОЛЯ ВВОДА И КНОПКИ */
        h2 { text-align: center; color: #38bdf8; margin-bottom: 25px; font-weight: 700; }
        label { display: block; margin-top: 15px; font-size: 13px; color: #94a3b8; margin-left: 5px; }
        
        select, input { 
            width: 100%; padding: 14px; margin-top: 8px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.8); 
            color: white; font-size: 16px; transition: 0.3s;
        }

        button { 
            width: 100%; padding: 16px; margin-top: 30px; border-radius: 12px; border: none; 
            background: linear-gradient(90deg, #0284c7 0%, #38bdf8 100%); 
            color: white; font-size: 16px; font-weight: 700; cursor: pointer;
            box-shadow: 0 10px 20px rgba(2, 132, 199, 0.4);
        }
        button:active { transform: scale(0.97); } /* Эффект нажатия */
        .admin-badge { background: #f59e0b; color: #000; padding: 3px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; }
    </style>
</head>
<body>

    <div class="bg-sphere sphere-1"></div>
    <div class="bg-sphere sphere-2"></div>

    <div id="client-ui" class="container">
        <h2>Premium Barber</h2>
        <label>Ваш номер телефона</label>
        <input type="tel" id="phone" value="8 7" maxlength="15">

        <label>Выберите услугу</label>
        <select id="service">
            <option value="Мужская стрижка (4000 ₸)">Мужская стрижка — 4 000 ₸</option>
            <option value="Стрижка бороды (2500 ₸)">Стрижка бороды — 2 500 ₸</option>
            <option value="Комплекс (6000 ₸)">Комплекс — 6 000 ₸</option>
        </select>

        <label>Дата и время визита</label>
        <input type="datetime-local" id="datetime" step="3600">

        <button onclick="sendOrder()">ЗАПИСАТЬСЯ</button>
    </div>

    <div id="admin-ui" class="container">
        <h2>Мастер <span class="admin-badge">Admin</span></h2>
        <p id="admin-greeting" style="text-align: center; font-size: 14px; color: #38bdf8;"></p>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">
        <label>ID клиента из сообщения</label>
        <input type="text" id="reply-id">
        <label>Текст ответа</label>
        <input type="text" id="reply-text">
        <button style="background: #10b981;" onclick="sendReply()">ОТПРАВИТЬ ОТВЕТ</button>
    </div>

    <script>
        /* JS: ОСНОВНАЯ ЛОГИКА ПРИЛОЖЕНИЯ */

        const tg = window.Telegram.WebApp;
        tg.expand();

        const BOT_TOKEN = "8424249026:AAHGygnDhf0-rbcJ8do6PwDjWfl3733q26Y";
        
        // --- СПИСОК МАСТЕРОВ ---
        // Вставь ID мастеров через запятую здесь
        const ADMIN_LIST = ["1384228457"]; 

        const user = tg.initDataUnsafe?.user;
        const userId = String(user?.id);
        const userName = user?.first_name || "Гость";

        // ЛОГИКА: Определяем, кто зашел (Клиент или Админ)
        if (ADMIN_LIST.includes(userId)) {
            document.getElementById('admin-ui').style.display = 'block';
            document.getElementById('admin-greeting').innerText = `Мастер: ${userName}`;
        } else {
            document.getElementById('client-ui').style.display = 'block';
        }

        // МАСКА ТЕЛЕФОНА: Делает формат "8 7XX XXX XX XX"
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length < 2) value = '87';
            let formatted = '8';
            if (value.length > 1) formatted += ' ' + value.substring(1, 4);
            if (value.length > 4) formatted += ' ' + value.substring(4, 7);
            if (value.length > 7) formatted += ' ' + value.substring(7, 9);
            if (value.length > 9) formatted += ' ' + value.substring(9, 11);
            e.target.value = formatted;
        });

        /* JS: ФУНКЦИЯ ЗАПИСИ (Отправка данных в бот) */
        async function sendOrder() {
            const rawPhone = phoneInput.value.replace(/\D/g, '');
            const service = document.getElementById('service').value;
            const datetime = document.getElementById('datetime').value;

            // Проверки на пустые поля
            if (rawPhone.length < 11 || !datetime) { 
                alert("Пожалуйста, заполните телефон и время!"); 
                return; 
            }

            // ПРОВЕРКА ВРЕМЕНИ: Не дает записаться дважды на одно время (на этом телефоне)
            const bookingKey = `book_${datetime}`;
            if (localStorage.getItem(bookingKey)) { 
                alert("Это время уже забронировано!"); 
                return; 
            }

            // ГЕНЕРАЦИЯ ССЫЛОК ДЛЯ МАСТЕРА
            const waPhone = '7' + rawPhone.substring(1); 
            const waLink = `https://wa.me/${waPhone}`;
            const adminText = `<b>🆕 НОВАЯ ЗАПИСЬ</b>\n━━━━━━━━━━━━━\n👤 <b>КЛИЕНТ:</b> ${userName}\n📞 <b>ТЕЛ:</b> <code>${rawPhone}</code>\n✂️ <b>УСЛУГА:</b> ${service}\n📅 <b>ВРЕМЯ:</b> ${datetime.replace('T', ' ')}\n━━━━━━━━━━━━━\n🔔 <b>НАПОМНИТЬ ЗА 30 МИНУТ!</b>\n━━━━━━━━━━━━━\n💬 <a href="${waLink}">WhatsApp клиента</a>\n🆔 <b>ID:</b> <code>${userId}</code>`;

            try {
                // Шлем уведомление КЛИЕНТУ
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        chat_id: userId, 
                        text: `✅ Вы успешно записаны!\n📅 Время: ${datetime.replace('T', ' ')}\n🔔 Мы напомним вам за 30 минут!` 
                    })
                });

                // Шлем уведомление всем МАСТЕРАМ
                for (let id of ADMIN_LIST) {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: id, text: adminText, parse_mode: 'HTML', disable_web_page_preview: true })
                    });
                }

                // Запоминаем бронь и закрываем приложение
                localStorage.setItem(bookingKey, "true");
                tg.showAlert("Запись успешно создана! До встречи.");
                tg.close();
            } catch (e) { alert("Ошибка при отправке заказа!"); }
        }

        /* JS: ФУНКЦИЯ ОТВЕТА (Мастер пишет клиенту через админку) */
        async function sendReply() {
            const cid = document.getElementById('reply-id').value.trim();
            const msg = document.getElementById('reply-text').value.trim();
            if (!cid || !msg) return alert("Введите ID и текст!");

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        chat_id: cid, 
                        text: `<b>✉️ Сообщение от BarberShop:</b>\n\n${msg}`, 
                        parse_mode: 'HTML' 
                    })
                });
                alert("Ответ отправлен!");
                document.getElementById('reply-text').value = "";
            } catch (e) { alert("Ошибка при отправке ответа!"); }
        }
    </script>
</body>
</html>
