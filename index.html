<!DOCTYPE html> <html lang="ru"> <head>
    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Beauty Hub Admin System</title> <script src="https://telegram.org/js/telegram-web-app.js"></script> <style>
        :root { /* Глобальные переменные цветов */
            --bg-main: linear-gradient(45deg, #0f172a, #1e293b, #0f172a);
            --bg-barber: linear-gradient(135deg, #020617, #0f172a, #1e293b);
            --bg-nails: linear-gradient(135deg, #4c0519, #831843, #9d174d);
        }

        body { /* Стили для фона и центровки */
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-main); color: #f8fafc; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; min-height: 100vh; margin: 0; transition: background 0.6s ease;
        }

        body.barber-mode { background: var(--bg-barber); } /* Фон при выборе барбера */
        body.nails-mode { background: var(--bg-nails); } /* Фон при выборе маникюра */

        .container { /* Основной стиль карточек */
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px);
            padding: 25px; border-radius: 30px; width: 100%; max-width: 360px; 
            border: 1px solid rgba(255, 255, 255, 0.1); box-sizing: border-box;
            display: none; flex-direction: column; align-items: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            animation: slideIn 0.5s ease-out; /* Анимация появления */
        }

        @keyframes slideIn { /* Описание анимации плавного появления сверху вниз */
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-card { /* Кнопки выбора на главном экране */
            width: 100%; background: rgba(255, 255, 255, 0.05);
            margin-bottom: 15px; padding: 25px; border-radius: 24px;
            display: flex; align-items: center; cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s;
        }
        .menu-card:active { transform: scale(0.95); } /* Эффект нажатия */
        .menu-card .icon { font-size: 32px; margin-right: 20px; } /* Иконки */

        h2 { text-align: center; margin: 0 0 20px 0; font-weight: 800; } /* Заголовки */
        .form-group { width: 100%; margin-bottom: 12px; display: flex; flex-direction: column; } /* Группировка полей */
        label { font-size: 11px; color: #94a3b8; margin-bottom: 6px; margin-left: 8px; text-transform: uppercase; } /* Подписи полей */
        
        input, select { /* Стили полей ввода */
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(15, 23, 42, 0.9); color: white; font-size: 16px; box-sizing: border-box; outline: none;
        }

        .btn-main { /* Основной стиль кнопок */
            width: 100%; padding: 18px; border-radius: 16px; border: none; 
            color: white; font-size: 16px; font-weight: 700; cursor: pointer; 
            margin-top: 10px; transition: 0.3s;
        }
        .btn-barber { background: linear-gradient(135deg, #0ea5e9, #2563eb); } /* Кнопка синяя */
        .btn-nails { background: linear-gradient(135deg, #be185d, #9d174d); } /* Кнопка розовая */
        .btn-admin { background: linear-gradient(135deg, #10b981, #059669); } /* Кнопка зеленая */

        .btn-back { margin-top: 20px; color: #94a3b8; font-size: 14px; cursor: pointer; } /* Кнопка назад */
    </style>
</head>
<body id="body">

    <div id="hub-ui" class="container" style="display: flex;">
        <h2 style="color: #fff;">Beauty Hub</h2> <div class="menu-card" onclick="openSection('barber')"><div class="icon">✂️</div><h3>Barbershop</h3></div> <div class="menu-card" onclick="openSection('nails')"><div class="icon">💅</div><h3>Manicure</h3></div> </div>

    <div id="barber-ui" class="container">
        <h2 style="color: #38bdf8;">Barbershop</h2> <div class="form-group"><label>Контактный телефон</label><input type="tel" id="b-phone" value="8 " maxlength="15"></div> <div class="form-group">
            <select id="b-master"><option value="Санжар">Санжар</option><option value="Женыс">Женыс</option></select> </div>
        <div class="form-group">
            <select id="b-service">
                <option>Мужская стрижка — 4 000 ₸</option>
                <option>Стрижка бороды — 2 500 ₸</option>
            </select> </div>
        <div class="form-group"><input type="datetime-local" id="b-date"></div> <button class="btn-main btn-barber" onclick="sendBooking('Barber')">ЗАПИСАТЬСЯ</button> <div class="btn-back" onclick="goBack()">← Назад</div> </div>

    <div id="nails-ui" class="container">
        <h2 style="color: #f472b6;">Manicure</h2> <div class="form-group"><label>Контактный телефон</label><input type="tel" id="n-phone" value="8 " maxlength="15"></div> <div class="form-group">
            <select id="n-master"><option value="Акмарал">Акмарал</option><option value="Жулдыз">Жулдыз</option></select> </div>
        <div class="form-group">
            <select id="n-service">
                <option>Маникюр + Гель — 5 000 ₸</option>
                <option>Педикюр — 6 000 ₸</option>
            </select> </div>
        <div class="form-group"><input type="datetime-local" id="n-date"></div> <button class="btn-main btn-nails" onclick="sendBooking('Manicure')">ЗАПИСАТЬСЯ</button> <div class="btn-back" onclick="goBack()">← Назад</div> </div>

    <div id="admin-ui" class="container">
        <h2>Мастер <span style="font-size: 10px; background: #f59e0b; color: #000; padding: 2px 6px; border-radius: 4px;">Control</span></h2> <div class="form-group"><label>ID или Тег клиента</label><input type="text" id="reply-id" placeholder="ID (числа)"></div> <div class="form-group"><label>Текст ответа</label><input type="text" id="reply-text" placeholder="Ваш ответ..."></div> <button class="btn-main btn-admin" onclick="sendReply()">ОТПРАВИТЬ ОТВЕТ</button> </div>

    <script>
        const tg = window.Telegram.WebApp; // Инициализация Telegram API
        tg.expand(); // Развернуть приложение
        const body = document.getElementById('body'); // Получение тела страницы
        const BOT_TOKEN = "8424249026:AAHGygnDhf0-rbcJ8do6PwDjWfl3733q26Y"; // Токен бота
        
        const MAIN_ADMIN_ID = "1384228457"; // Главный админ
        const ADMIN_LIST = ["1384228457", "ТВОЙ_ВТОРОЙ_ID", "ID_МАСТЕРА"]; // Список всех админов

        const userId = String(tg.initDataUnsafe?.user?.id || ""); // Получение ID текущего юзера
        const userName = tg.initDataUnsafe?.user?.first_name || "Клиент"; // Имя юзера
        const userTag = tg.initDataUnsafe?.user?.username ? "@" + tg.initDataUnsafe.user.username : "нет тега"; // Тег юзера

        if (ADMIN_LIST.includes(userId)) { // Проверка: если юзер в списке админов
            document.getElementById('hub-ui').style.display = 'none'; // Скрыть меню
            document.getElementById('admin-ui').style.display = 'flex'; // Показать админку
        }

        function setupPhoneMask(id) { // Функция для красивого ввода номера
            const input = document.getElementById(id); // Поиск поля по ID
            input.addEventListener('input', () => { // При вводе
                let val = input.value.replace(/\D/g, ''); // Удаляем буквы
                if (!val.startsWith('8')) val = '8' + val; // Всегда начинаем с 8
                let f = '8'; // Переменная для маски
                if (val.length > 1) f += ' ' + val.substring(1, 4); // Код оператора
                if (val.length > 4) f += ' ' + val.substring(4, 7); // Первая часть номера
                if (val.length > 7) f += ' ' + val.substring(7, 9); // Вторая часть
                if (val.length > 9) f += ' ' + val.substring(9, 11); // Последние цифры
                input.value = f; // Установка текста в поле
            });
        }
        setupPhoneMask('b-phone'); setupPhoneMask('n-phone'); // Запуск маски для обоих форм

        function openSection(s) { // Переключение между окнами
            document.getElementById('hub-ui').style.display = 'none'; // Скрыть главное меню
            document.getElementById(s + '-ui').style.display = 'flex'; // Показать выбранное
            body.className = s + '-mode'; // Сменить цвет фона
        }

        function goBack() { // Возврат на главный экран
            document.querySelectorAll('.container').forEach(c => c.style.display = 'none'); // Скрыть всё
            document.getElementById('hub-ui').style.display = 'flex'; // Показать меню
            body.className = ''; // Вернуть обычный фон
        }

        async function sendBooking(type) { // Функция отправки заказа
            const p = type === 'Barber' ? 'b-' : 'n-'; // Определение префикса полей
            const phone = document.getElementById(p + 'phone').value; // Номер телефона
            const master = document.getElementById(p + 'master').value; // Имя мастера
            const service = document.getElementById(p + 'service').value; // Услуга
            const date = document.getElementById(p + 'date').value; // Дата
            if (phone.length < 14 || !date) return alert("Заполните данные!"); // Проверка полей

            const addressLink = type === 'Barber' // Генерация ссылки 2GIS
                ? '📍 <a href="https://2gis.kz/almaty/geo/70000001057645936">SR Barbershop</a>' 
                : '📍 <a href="https://2gis.kz/almaty/geo/70000001081999536">Cozy lab</a>';

            const adminMsg = `🚀 <b>ЗАПИСЬ (${type})</b>\n👤 ${userName} (${userTag})\n📞 ${phone}\n👤 Мастер: ${master}\n✂️ ${service}\n📅 ${date.replace('T', ' ')}\n🆔 <code>${userId}</code>`; // Текст админу
            const clientMsg = `✅ <b>ВЫ ЗАПИСАНЫ!</b>\n👤 Мастер: ${master}\n✂️ ${service}\n📅 ${date.replace('T', ' ')}\n${addressLink}\n🔔 Напомним за 30 минут!`; // Текст клиенту

            try {
                for (let adminId of ADMIN_LIST) { // Отправка уведомления каждому админу
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: adminId, text: adminMsg, parse_mode: 'HTML' })
                    });
                }
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { // Отправка подтверждения клиенту
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: userId, text: clientMsg, parse_mode: 'HTML' })
                });
                tg.showAlert("Запись подтверждена!"); // Успешное окно
                tg.close(); // Закрыть приложение
            } catch (e) { alert("Ошибка отправки заказа."); } // Ошибка
        }

        async function sendReply() { // Функция ответа мастера
            const targetId = document.getElementById('reply-id').value.trim(); // ID получателя
            const messageText = document.getElementById('reply-text').value.trim(); // Текст ответа
            if (!targetId || !messageText) return alert("Введите ID клиента и текст!"); // Проверка

            const toClient = `<b>✉️ Сообщение от мастера:</b>\n${messageText}`; // Текст клиенту
            const logMsg = `🛠 <b>ОТВЕТ АДМИНА</b>\n━━━━━━━━━━━━━\n✍️ <b>Отправил:</b> ${userName} (${userTag})\n🆔 <b>ID админа:</b> <code>${userId}</code>\n\n👤 <b>Кому (ID клиента):</b> <code>${targetId}</code>\n💬 <b>Текст:</b> ${messageText}`; // Текст лога

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { // Отправка сообщения
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: targetId, text: toClient, parse_mode: 'HTML' })
                });
                if (userId !== MAIN_ADMIN_ID) { // Дублирование лога главному админу
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: MAIN_ADMIN_ID, text: logMsg, parse_mode: 'HTML' })
                    });
                }
                alert("Сообщение успешно отправлено!"); // Успех
                document.getElementById('reply-text').value = ""; // Очистка поля
            } catch (e) { alert("Ошибка! Проверьте правильность ID клиента."); } // Ошибка
        }
    </script>
</body>
</html>
