<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Hub Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* Весь CSS остается прежним, я его не меняю, чтобы сохранить твой дизайн */
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(45deg, #0f172a, #1e293b, #0f172a, #1e3a8a); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; min-height: 100vh; margin: 0; overflow: hidden; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .container { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(20px); padding: 25px; border-radius: 30px; width: 100%; max-width: 360px; border: 1px solid rgba(255, 255, 255, 0.1); box-sizing: border-box; display: none; flex-direction: column; align-items: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); }
        .menu-card { width: 100%; background: rgba(255, 255, 255, 0.05); margin-bottom: 15px; padding: 20px; border-radius: 24px; display: flex; align-items: center; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; }
        .menu-card:active { transform: scale(0.95); }
        .menu-card .icon { font-size: 38px; margin-right: 18px; }
        h2 { text-align: center; margin: 0 0 20px 0; font-weight: 800; }
        .form-group { width: 100%; margin-bottom: 12px; display: flex; flex-direction: column; }
        label { font-size: 11px; color: #94a3b8; margin-bottom: 6px; margin-left: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.9); color: white; font-size: 16px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 18px; border-radius: 16px; border: none; color: white; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-barber { background: linear-gradient(135deg, #0284c7, #38bdf8); }
        .btn-nails { background: linear-gradient(135deg, #db2777, #f472b6); }
        .btn-back-styled { display: flex; align-items: center; justify-content: center; width: fit-content; margin: 20px auto 0; padding: 10px 22px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 50px; color: #94a3b8; font-size: 14px; cursor: pointer; }
        .status-msg { font-size: 13px; text-align: center; color: #fbbf24; background: rgba(251, 191, 36, 0.1); padding: 12px; border-radius: 15px; margin-bottom: 20px; width: 100%; border: 1px solid rgba(251, 191, 36, 0.2); box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="hub-ui" class="container" style="display: flex;">
        <h2 style="font-size: 26px;">Beauty Hub</h2>
        <div id="active-booking-status"></div> 
        <div class="menu-card" onclick="openSection('barber')"><div class="icon">✂️</div><div class="text"><h3>Barbershop</h3><p>Санжар, Женыс</p></div></div>
        <div class="menu-card" onclick="openSection('nails')"><div class="icon">💅</div><div class="text"><h3>Manicure</h3><p>Акмарал, Жулдыз</p></div></div>
    </div>

    <div id="barber-ui" class="container">
        <h2 style="color: #38bdf8;">Barbershop</h2>
        <div class="form-group"><label>Номер телефона</label><input type="tel" id="b-phone" value="8 " maxlength="15"></div>
        <div class="form-group"><label>Выберите мастера</label><select id="b-master"><option value="Санжар">Санжар</option><option value="Женыс">Женыс</option></select></div>
        <div class="form-group"><label>Услуга</label><select id="b-service"><option>Мужская стрижка</option><option>Стрижка бороды</option><option>Комплекс</option></select></div>
        <div class="form-group"><label>Дата и время</label><input type="datetime-local" id="b-date"></div>
        <button class="btn-main btn-barber" onclick="sendBooking('Barber')">ЗАПИСАТЬСЯ</button>
        <div class="btn-back-styled" onclick="goBack()"><span>←</span> Назад</div>
    </div>

    <div id="nails-ui" class="container">
        <h2 style="color: #f472b6;">Manicure</h2>
        <div class="form-group"><label>Номер телефона</label><input type="tel" id="n-phone" value="8 " maxlength="15"></div>
        <div class="form-group"><label>Выберите мастера</label><select id="n-master"><option value="Акмарал">Акмарал</option><option value="Жулдыз">Жулдыз</option></select></div>
        <div class="form-group"><label>Услуга</label><select id="n-service"><option>Маникюр + Гель</option><option>Наращивание</option><option>Педикюр</option></select></div>
        <div class="form-group"><label>Дата и время</label><input type="datetime-local" id="n-date"></div>
        <button class="btn-main btn-nails" onclick="sendBooking('Manicure')">ЗАПИСАТЬСЯ</button>
        <div class="btn-back-styled" onclick="goBack()"><span>←</span> Назад</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const BOT_TOKEN = "8424249026:AAHGygnDhf0-rbcJ8do6PwDjWfl3733q26Y";
        const MAIN_ADMIN = "1384228457";
        const ADMIN_LIST = [MAIN_ADMIN];

        // Более надежный захват ID пользователя
        const userId = tg.initDataUnsafe?.user?.id;
        const userName = tg.initDataUnsafe?.user?.first_name || "Клиент";

        // Маска 8...
        function setupPhoneMask(id) {
            const input = document.getElementById(id);
            input.addEventListener('input', () => {
                let val = input.value.replace(/\D/g, '');
                if (!val.startsWith('8')) val = '8' + val;
                let formatted = '8';
                if (val.length > 1) formatted += ' ' + val.substring(1, 4);
                if (val.length > 4) formatted += ' ' + val.substring(4, 7);
                if (val.length > 7) formatted += ' ' + val.substring(7, 9);
                if (val.length > 9) formatted += ' ' + val.substring(9, 11);
                input.value = formatted;
            });
        }
        setupPhoneMask('b-phone');
        setupPhoneMask('n-phone');

        function openSection(type) {
            document.getElementById('hub-ui').style.display = 'none';
            document.getElementById(type + '-ui').style.display = 'flex';
        }
        function goBack() {
            document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
            document.getElementById('hub-ui').style.display = 'flex';
        }

        async function sendBooking(category) {
            const prefix = category === 'Barber' ? 'b-' : 'n-';
            const phone = document.getElementById(prefix + 'phone').value;
            const master = document.getElementById(prefix + 'master').value;
            const service = document.getElementById(prefix + 'service').value;
            const dateInput = document.getElementById(prefix + 'date').value;

            if (phone.length < 14 || !dateInput) return alert("Заполните данные!");

            // 1. Сообщение для АДМИНА
            const adminText = `🚀 <b>НОВАЯ ЗАПИСЬ</b>\n👤 Клиент: ${userName}\n📞 Тел: ${phone}\n👤 Мастер: ${master}\n✂️ Услуга: ${service}\n📅 Дата: ${dateInput.replace('T', ' ')}\n🆔 ID: ${userId}`;

            // 2. Сообщение для КЛИЕНТА
            const clientText = `✅ <b>ВЫ ЗАПИСАНЫ!</b>\n━━━━━━━━━━━━━\n👤 Мастер: ${master}\n✂️ Услуга: ${service}\n📅 Время: ${dateInput.replace('T', ' ')}\n━━━━━━━━━━━━━\n🔔 Напомним вам за 30 минут!`;

            try {
                // Отправка админу
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: MAIN_ADMIN, text: adminText, parse_mode: 'HTML' })
                });

                // ОТПРАВКА КЛИЕНТУ (userId)
                if (userId) {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: userId, text: clientText, parse_mode: 'HTML' })
                    });
                }

                tg.showAlert("Запись подтверждена! Проверьте сообщения от бота.");
                tg.close();
            } catch (e) {
                alert("Ошибка связи с ботом.");
            }
        }
    </script>
</body>
</html>
