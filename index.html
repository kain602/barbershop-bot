<!DOCTYPE html> <html lang="ru"> <head>
    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <script src="https://telegram.org/js/telegram-web-app.js"></script> <style> /* ОФОРМЛЕНИЕ (Сжатое) */
        :root { --b: #0f172a; } /* Основной цвет */
        body { font-family: sans-serif; background: var(--b); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; transition: .5s; } /* База */
        .barber-mode { background: #020617; } .nails-mode { background: #4c0519; } /* Фоны разделов */
        .c { background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); padding: 25px; border-radius: 25px; width: 100%; max-width: 350px; display: none; flex-direction: column; border: 1px solid #fff2; } /* Контейнеры */
        .m { background: #fff1; padding: 20px; border-radius: 15px; margin-bottom: 10px; cursor: pointer; border: 1px solid #fff1; font-weight: bold; } /* Кнопки меню */
        input, select, button { width: 100%; padding: 14px; margin: 5px 0; border-radius: 12px; border: none; font-size: 16px; box-sizing: border-box; outline: none; } /* Поля */
        input, select { background: #0005; color: #fff; border: 1px solid #fff1; } /* Ввод данных */
        button { font-weight: bold; color: #fff; cursor: pointer; transition: .2s; } button:active { transform: scale(0.97); } /* Кнопки */
        .bb { background: #2563eb; } .bn { background: #be185d; } .ba { background: #10b981; } /* Цвета кнопок */
        small { color: #94a3b8; text-align: center; margin-top: 10px; cursor: pointer; } /* Кнопка назад */
    </style>
</head>
<body id="body">
    <div id="h" class="c" style="display:flex"><h2>Beauty Hub</h2><div class="m" onclick="s('barber')">✂️ Barbershop</div><div class="m" onclick="s('nails')">💅 Manicure</div></div>

    <div id="barber-ui" class="c"><h2>Barber</h2><input id="bp" value="8 "><select id="bm"><option>Санжар</option><option>Женыс</option></select><input type="datetime-local" id="bd"><button class="bb" onclick="send('Barber')">ЗАПИСАТЬСЯ</button><small onclick="g()">← Назад</small></div>

    <div id="nails-ui" class="c"><h2>Nails</h2><input id="np" value="8 "><select id="nm"><option>Акмарал</option><option>Жулдыз</option></select><input type="datetime-local" id="nd"><button class="bn" onclick="send('Manicure')">ЗАПИСАТЬСЯ</button><small onclick="g()">← Назад</small></div>

    <div id="ad" class="c"><h2>Admin</h2><input id="ri" placeholder="ID клиента"><input id="rt" placeholder="Текст ответа"><button class="ba" onclick="rep()">ОТПРАВИТЬ</button></div>

    <script> /* ЛОГИКА (JavaScript) */
        const tg = window.Telegram.WebApp; tg.expand(); // Настройка WebApp
        const BT = "8424249026:AAHGygnDhf0-rbcJ8do6PwDjWfl3733q26Y"; // Токен бота
        const MA = "1384228457"; // Твой основной ID
        const AL = [MA, "ВТОРОЙ_ID"]; // СПИСОК АДМИНОВ (Сюда добавляй ID)

        const ui = String(tg.initDataUnsafe?.user?.id || ""), ut = "@" + (tg.initDataUnsafe?.user?.username || "no_tag"); // Данные юзера
        if (AL.includes(ui)) { document.getElementById('h').style.display='none'; document.getElementById('ad').style.display='flex'; } // Проверка на админа

        const msk = (i) => document.getElementById(i).oninput = (e) => { // Маска телефона 8 7XX...
            let v = e.target.value.replace(/\D/g,''); if(!v.startsWith('8')) v='8'+v;
            e.target.value = (v[0]||'8') + (v[1]?' '+v.slice(1,4):'') + (v[4]?' '+v.slice(4,7):'') + (v[7]?' '+v.slice(7,9):'') + (v[9]?' '+v.slice(9,11):'');
        };
        msk('bp'); msk('np'); // Включение маски

        const s = (x) => { document.getElementById('h').style.display='none'; document.getElementById(x+'-ui').style.display='flex'; document.body.className=x+'-mode'; }; // Открыть раздел
        const g = () => { document.querySelectorAll('.c').forEach(e=>e.style.display='none'); document.getElementById('h').style.display='flex'; document.body.className=''; }; // Назад
        const api = (c, t) => fetch(`https://api.telegram.org/bot${BT}/sendMessage`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({chat_id:c, text:t, parse_mode:'HTML'}) }); // Отправка сообщения

        async function send(t) { // Запись на услугу
            const p = t==='Barber'?'b':'n', ph = document.getElementById(p+'p').value, m = document.getElementById(p+'m').value, d = document.getElementById(p+'d').value;
            if (ph.length < 14 || !d) return alert("Заполни данные!"); // Проверка полей
            const ln = t==='Barber'?'70000001057645936':'70000001081999536'; // ID для 2GIS
            for(let a of AL) await api(a, `🚀 <b>${t}</b>\n👤 ${ut}\n📞 ${ph}\n👤 Мастер: ${m}\n📅 ${d.replace('T',' ')}\n🆔 <code>${ui}</code>`); // Уведомление всем админам
            await api(ui, `✅ <b>Вы записаны!</b>\n👤 Мастер: ${m}\n📅 ${d.replace('T',' ')}\n📍 <a href="https://2gis.kz/almaty/geo/${ln}">Адрес (2GIS)</a>`); // Подтверждение клиенту
            tg.close(); // Закрыть приложение
        }

        async function rep() { // Ответ из админки
            const i = document.getElementById('ri').value, t = document.getElementById('rt').value;
            if(!i || !t) return alert("Заполни поля!"); // Проверка
            await api(i, `<b>✉️ Сообщение от мастера:</b>\n${t}`); // Отправка клиенту
            if(ui !== MA) await api(MA, `🛠 <b>Лог:</b> ${ut} (ID:${ui}) -> клиенту <code>${i}</code>\nТекст: ${t}`); // Дубликат тебе (Лог)
            alert("Отправлено!"); document.getElementById('rt').value = ""; // Сброс
        }
    </script>
</body>
</html>
