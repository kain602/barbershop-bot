<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberShop KZ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #ffffff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #1e1e1e; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 350px; display: none; }
        h2 { text-align: center; color: #0088cc; margin-top: 0; }
        label { display: block; margin-top: 15px; font-size: 14px; color: #aaa; text-align: left; width: 100%; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #333; background: #2b2b2b; color: white; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; margin-top: 25px; border-radius: 10px; border: none; background: #0088cc; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        .admin-badge { background: #ff9800; color: black; padding: 2px 8px; border-radius: 5px; font-size: 12px; vertical-align: middle; }
        .price-info { font-size: 12px; color: #666; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <div id="client-ui" class="container">
        <h2>Запись на стрижку</h2>
        <label>Ваш номер телефона</label>
        <input type="tel" id="phone" value="+7 7" maxlength="16">

        <label>Выберите услугу:</label>
        <select id="service">
            <option value="Мужская стрижка (4000 ₸)">Мужская стрижка — 4 000 ₸</option>
            <option value="Стрижка бороды (2500 ₸)">Стрижка бороды — 2 500 ₸</option>
            <option value="Комплекс (6000 ₸)">Комплекс (Стрижка+Борода) — 6 000 ₸</option>
        </select>

        <label>Мастер:</label>
        <select id="master_choice">
            <option value="Алексей">Алексей</option>
            <option value="Дмитрий">Дмитрий</option>
        </select>

        <label>Дата и время:</label>
        <input type="datetime-local" id="datetime">

        <button onclick="sendOrder()">ПОДТВЕРДИТЬ ЗАПИСЬ</button>
        <p class="price-info">Оплата производится в барбершопе</p>
    </div>

    <div id="admin-ui" class="container">
        <h2>Панель Мастера <span class="admin-badge">ADMIN</span></h2>
        <p id="admin-greeting" style="text-align: center; color: #0088cc;"></p>
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        
        <label>ID клиента (из сообщения):</label>
        <input type="text" id="reply-id" placeholder="Например: 12345678">
        
        <label>Ваш ответ клиенту:</label>
        <input type="text" id="reply-text" placeholder="Пример: Ждем вас в 15:00!">
        
        <button style="background: #4caf50;" onclick="sendReply()">ОТПРАВИТЬ ОТВЕТ</button>
        <p style="font-size: 11px; color: #666; margin-top: 15px;">Здесь вы можете отправить личное сообщение клиенту по его ID.</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const BOT_TOKEN = "8424249026:AAHGygnDhf0-rbcJ8do6PwDjWfl3733q26Y";
        
        // --- СПИСОК АДМИНОВ (Твой ID и ID мастера) ---
        // Добавь ID мастера в кавычках через запятую
        const ADMIN_LIST = ["1384228457"]; 
        // ---------------------------------------------

        const user = tg.initDataUnsafe?.user;
        const userId = String(user?.id);
        const userName = user?.first_name || "Клиент";

        // Проверка прав доступа
        if (ADMIN_LIST.includes(userId)) {
            document.getElementById('admin-ui').style.display = 'block';
            document.getElementById('admin-greeting').innerText = `С возвращением, ${userName}!`;
        } else {
            document.getElementById('client-ui').style.display = 'block';
        }

        // Фиксация +7 7
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', (e) => {
            if (!e.target.value.startsWith('+7 7')) e.target.value = '+7 7';
        });

        // Функция отправки записи
        async function sendOrder() {
            const phone = phoneInput.value.trim();
            const service = document.getElementById('service').value;
            const master = document.getElementById('master_choice').value;
            const datetime = document.getElementById('datetime').value;

            if (phone.replace(/\D/g, '').length < 11) {
                alert("Пожалуйста, введите полный номер телефона!");
                return;
            }
            if (!datetime) {
                alert("Выберите дату и время!");
                return;
            }

            const adminText = `<b>🚀 НОВАЯ ЗАПИСЬ (KZ)</b>\n━━━━━━━━━━━━━\n👤 <b>Клиент:</b> ${userName}\n📞 <b>Тел:</b> <code>${phone}</code>\n✂️ <b>Услуга:</b> ${service}\n🧔 <b>Мастер:</b> ${master}\n📅 <b>Время:</b> ${datetime.replace('T', ' ')}\n━━━━━━━━━━━━━\n🆔 <b>ID для ответа:</b> <code>${userId}</code>`;
            
            const clientText = `<b>✅ ВЫ ЗАПИСАНЫ!</b>\n\n✂️ Услуга: ${service}\n🧔 Мастер: ${master}\n📅 Время: ${datetime.replace('T', ' ')}\n\n<i>Наш мастер свяжется с вами по номеру ${phone} для подтверждения.</i>`;

            try {
                // 1. Уведомление КЛИЕНТУ
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: userId, text: clientText, parse_mode: 'HTML' })
                });

                // 2. Уведомление ВСЕМ АДМИНАМ (Тебе и Мастеру)
                for (let adminId of ADMIN_LIST) {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: adminId, text: adminText, parse_mode: 'HTML' })
                    });
                }

                tg.showAlert("Запись успешно оформлена! Проверьте сообщения в Telegram.");
                tg.close();
            } catch (e) {
                alert("Ошибка при отправке. Попробуйте снова.");
            }
        }

        // Функция ответа админа
        async function sendReply() {
            const cid = document.getElementById('reply-id').value.trim();
            const msg = document.getElementById('reply-text').value.trim();

            if (!cid || !msg) {
                alert("Введите ID клиента и текст ответа!");
                return;
            }

            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: cid,
                        text: `<b>✉️ Сообщение от BarberShop:</b>\n\n${msg}`,
                        parse_mode: 'HTML'
                    })
                });

                if (res.ok) {
                    alert("Ответ успешно отправлен клиенту!");
                    document.getElementById('reply-text').value = "";
                } else {
                    alert("Не удалось отправить. Возможно, ID неверный.");
                }
            } catch (e) {
                alert("Ошибка сети.");
            }
        }
    </script>
</body>
</html>
